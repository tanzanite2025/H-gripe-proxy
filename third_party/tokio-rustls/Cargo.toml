# Vendored from https://github.com/Watfaq/tokio-rustls (branch watfaq/0.26.4).
# Async TLS adapter matching the vendored Watfaq rustls REALITY fork. Vendored
# in-tree (path patch via the workspace `[patch.crates-io]`). Upstream dev
# dependencies are dropped (consumed as a library only).
# See docs/go-to-rust-migration-roadmap.md for rationale and maintenance note.
[package]
name = "tokio-rustls"
version = "0.26.4"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Watfaq/tokio-rustls"
homepage = "https://github.com/Watfaq/tokio-rustls"
documentation = "https://docs.rs/tokio-rustls"
description = "Asynchronous TLS/SSL streams for Tokio using Rustls (Watfaq fork, vendored)."
categories = ["asynchronous", "cryptography", "network-programming"]
edition = "2021"
rust-version = "1.71"

[dependencies]
rustls = { version = "0.23.27", default-features = false, features = ["std"] }
tokio = "1.0"

[features]
default = ["logging", "tls12", "aws_lc_rs"]
aws_lc_rs = ["rustls/aws_lc_rs"]
aws-lc-rs = ["aws_lc_rs"] # Alias because Cargo features commonly use `-`
brotli = ["rustls/brotli"]
early-data = []
fips = ["rustls/fips"]
logging = ["rustls/logging"]
ring = ["rustls/ring"]
tls12 = ["rustls/tls12"]
zlib = ["rustls/zlib"]

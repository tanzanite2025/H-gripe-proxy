# Vendored from https://github.com/Watfaq/rustls (branch watfaq/0.23.40).
# This is the upstream rustls TLS library plus Watfaq's REALITY extension
# (`ClientConfig::builder().with_reality()` + `rustls::client::RealityConfig`).
# We vendor it in-tree (path patch via the workspace `[patch.crates-io]`) so the
# kernel owns its TLS stack with zero external fork dependency. The dev/test/
# bench/example sections of the upstream manifest are dropped (we consume this
# crate as a library only); the workspace-inherited dependencies are inlined.
# See docs/go-to-rust-migration-roadmap.md for the rationale and maintenance note.
[package]
name = "rustls"
version = "0.23.40"
edition = "2021"
rust-version = "1.71"
license = "Apache-2.0 OR ISC OR MIT"
description = "Rustls is a modern TLS library written in Rust (Watfaq REALITY fork, vendored)."
homepage = "https://github.com/Watfaq/rustls"
repository = "https://github.com/Watfaq/rustls"
categories = ["network-programming", "cryptography"]
autobenches = false
autotests = false
exclude = ["src/testdata", "tests/**"]
build = "build.rs"

[features]
default = ["aws_lc_rs", "logging", "prefer-post-quantum", "std", "tls12"]

aws-lc-rs = ["aws_lc_rs"] # Alias because Cargo features commonly use `-`
aws_lc_rs = ["dep:aws-lc-rs", "webpki/aws-lc-rs", "aws-lc-rs/aws-lc-sys", "aws-lc-rs/prebuilt-nasm"]
brotli = ["dep:brotli", "dep:brotli-decompressor", "std"]
custom-provider = []
fips = ["aws_lc_rs", "aws-lc-rs?/fips", "webpki/aws-lc-rs-fips"]
logging = ["log"]
prefer-post-quantum = ["aws_lc_rs"]
read_buf = ["rustversion", "std"]
ring = ["dep:ring", "webpki/ring"]
std = ["webpki/std", "pki-types/std", "once_cell/std"]
tls12 = []
zlib = ["dep:zlib-rs"]

[build-dependencies]
rustversion = { version = "1.0.6", optional = true }

[dependencies]
aws-lc-rs = { version = "1.14", default-features = false, optional = true }
brotli = { version = "8", default-features = false, features = ["std"], optional = true }
brotli-decompressor = { version = "5.0.0", optional = true }
hashbrown = { version = "0.15", default-features = false, features = ["default-hasher", "inline-more"], optional = true }
log = { version = "0.4.8", optional = true }
# only required for no-std
once_cell = { version = "1.16", default-features = false, features = ["alloc", "race"] }
ring = { version = "0.17", optional = true }
subtle = { version = "2.5.0", default-features = false }
x25519-dalek = { version = "2", features = ["static_secrets"] }
webpki = { package = "rustls-webpki", version = "0.103.5", features = ["alloc"], default-features = false }
pki-types = { package = "rustls-pki-types", version = "1.12", features = ["alloc"] }
zeroize = { version = "1.8" }
zlib-rs = { version = "0.6", optional = true }

[package.metadata.docs.rs]
features = ["read_buf", "ring"]
rustdoc-args = ["--cfg", "rustls_docsrs"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  "cfg(bench)",
  "cfg(coverage_nightly)",
  "cfg(read_buf)",
  "cfg(rustls_docsrs)",
] }

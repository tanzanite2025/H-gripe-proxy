name: Trigger CMFA Update
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/ISSUE_TEMPLATE/**"
    branches:
      - Alpha
    tags:
      - "v*"
      
jobs:
  # Optional: send "core-updated" to a downstream app repository.
  trigger-CMFA-update:
    if: ${{ vars.CMFA_UPDATE_REPOSITORY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          client-id: ${{ secrets.MAINTAINER_APPID }}
          private-key: ${{ secrets.MAINTAINER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      
      - name: Trigger update-dependencies
        run: |
          curl -X POST "https://api.github.com/repos/${{ vars.CMFA_UPDATE_REPOSITORY }}/dispatches" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            -H "Authorization: token ${{ steps.generate-token.outputs.token }}" \
            -d '{"event_type": "core-updated"}'
